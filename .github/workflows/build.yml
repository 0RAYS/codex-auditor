name: Build Audit-Pwn Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * *"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-audit-pwn-image
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          repository="${REPOSITORY,,}"
          branch="${BRANCH,,}"
          branch="${branch//\//-}"
          branch="$(printf '%s' "${branch}" | sed 's/[^a-z0-9._-]/-/g; s/--*/-/g; s/^-//; s/-$//')"
          echo "name=ghcr.io/${repository}-${branch}" >> "$GITHUB_OUTPUT"

      - name: Fetch latest Codex release
        id: codex
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: 'openai',
              repo: 'codex',
            });
            const tag = release.data.tag_name;
            const match = tag.match(/\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?/);
            const version = match ? match[0] : tag.replace(/^v/, '');

            core.info(`Latest Codex release tag: ${tag}`);
            core.setOutput('tag', tag);
            core.setOutput('version', version);

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether image tags already exist
        id: exists
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          VERSION: ${{ steps.codex.outputs.version }}
        run: |
          version_exists=false
          latest_exists=false

          if docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION}" >/dev/null 2>&1; then
            version_exists=true
          fi

          if docker buildx imagetools inspect "${IMAGE_NAME}:latest" >/dev/null 2>&1; then
            latest_exists=true
          fi

          if [[ "${version_exists}" == "true" && "${latest_exists}" == "true" ]]; then
            echo "build_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
          fi

          echo "version_exists=${version_exists}" >> "$GITHUB_OUTPUT"
          echo "latest_exists=${latest_exists}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: steps.exists.outputs.build_needed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.codex.outputs.version }}
            ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.codex.outputs.version }}
            org.opencontainers.image.description=0RAYS Codex Auditor

      - name: Summarize result
        shell: bash
        run: |
          {
            echo "## Codex release check"
            echo ""
            echo "- Upstream tag: \`${{ steps.codex.outputs.tag }}\`"
            echo "- Parsed version: \`${{ steps.codex.outputs.version }}\`"
            echo "- Image: \`${{ steps.image.outputs.name }}\`"
            echo "- Existing version tag: \`${{ steps.exists.outputs.version_exists }}\`"
            echo "- Existing latest tag: \`${{ steps.exists.outputs.latest_exists }}\`"
            echo "- Build triggered: \`${{ steps.exists.outputs.build_needed }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
